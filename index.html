<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<title>Hlasování o sportovci roku Libereckého kraje</title>

<body>
    <div id="prihlaseni">
        <form id="loginForm">
            <div class="name">
                <label for="nameInput" class="text">Jméno a Příjmení:</label>
                <input type="text" required class="input" id="nameInput" name="fullname" value="" placeholder="Zadejte jméno a příjmení">
            </div>
            <div class="organization">
                <label for="orgInput" class="text">Organizace:</label> 
                <input type="text" required class="input" id="orgInput" name="organization" value="" placeholder="Zadejte název organizace">
            </div>
            <div class="enter">
            <button id="button1" type="submit">Pokračovat</button>
            </div>
        </form>
    </div>
<script src="style.js"></script>
</body>
</html>
